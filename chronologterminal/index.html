<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChronoLog Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f11;
      --panel: #0d1417;
      --panel-2: #0f1d1c;
      --line: #183126;
      --text: #86ff9e;
      --muted: #8fb4a0;
      --gold: #f8e390;
      --red: #ff5656;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% -20%, rgba(248, 227, 144, .09), transparent 35%),
        linear-gradient(180deg, #090d10 0%, var(--bg) 100%);
      color: var(--text);
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    #terminal {
      width: min(960px, 100%);
      padding: 16px;
    }

    #status {
      min-height: 1.5em;
      margin-bottom: 8px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    #screen {
      min-height: min(58vh, 520px);
      max-height: 68vh;
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(rgba(255,255,255,.025) 50%, rgba(0,0,0,.025) 50%) 0 0 / 100% 4px,
        var(--panel);
      box-shadow: inset 0 0 80px rgba(134, 255, 158, .05), 0 18px 60px rgba(0,0,0,.28);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .line { min-height: 1.45em; }
    .dim { color: var(--muted); }
    .gold { color: var(--gold); }
    .red { color: var(--red); }

    form#cmd {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    #input {
      flex: 1;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid #1c3d2a;
      border-radius: 8px;
      outline: none;
      background: #0f2a1a;
      color: #a8ffbf;
      font: inherit;
    }

    #input:focus {
      border-color: #398a51;
      box-shadow: 0 0 0 2px rgba(134, 255, 158, .12);
    }

    button {
      width: 44px;
      border: 1px solid #3d3a24;
      border-radius: 8px;
      background: #17160e;
      color: var(--gold);
      font: inherit;
      cursor: pointer;
    }

    button:hover { border-color: var(--gold); }

    .flash-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
    }

    .flash-gold {
      background: radial-gradient(60% 60% at 50% 50%, rgba(248,227,144,.35), rgba(248,227,144,0) 70%);
    }

    .flash-red {
      background: radial-gradient(60% 60% at 50% 50%, rgba(255,70,70,.25), rgba(255,70,70,0) 70%);
    }

    .flash-active { animation: flashFade .6s ease-out; }

    @keyframes flashFade {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 620px) {
      body { padding: 12px; }
      #terminal { padding: 8px 0; }
      #screen { min-height: 58vh; }
    }
  </style>
  <script>
    function makeAnimatedRingDataURL(color){
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <defs><filter id="g"><feGaussianBlur stdDeviation="1.3"/></filter></defs>
        <circle cx="32" cy="32" r="24" fill="none" stroke="${color}" stroke-width="5" opacity=".9"/>
        <path d="M32 8a24 24 0 0 1 24 24" fill="none" stroke="#fff7c4" stroke-width="5" stroke-linecap="round" filter="url(#g)"/>
        <circle cx="32" cy="32" r="4" fill="${color}"/>
      </svg>`;
      return "data:image/svg+xml;base64," + btoa(svg);
    }

    function setFaviconDataURL(url){
      let link = document.querySelector('link[rel="icon"]');
      if(!link){
        link = document.createElement("link");
        link.rel = "icon";
        document.head.appendChild(link);
      }
      link.href = url;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setFaviconDataURL(makeAnimatedRingDataURL("#f8e390"));
    });
  </script>
</head>
<body>
  <div id="flash" class="flash-overlay"></div>
  <audio id="sfxRumble" src="assets/sfx/rumble.mp3" preload="auto"></audio>
  <audio id="sfxWhisper" src="assets/sfx/whisper_rev.mp3" preload="auto"></audio>

  <main id="terminal" aria-label="ChronoLog terminal">
    <div id="status">BOOTING</div>
    <div id="screen" aria-live="polite"></div>
    <form id="cmd" autocomplete="off">
      <input id="input" name="input" spellcheck="false" aria-label="Terminal command" placeholder="TYPE HELP">
      <button type="submit" title="Send" aria-label="Send command">></button>
    </form>
  </main>

  <script>
    const LOGS_JSON = "assets/logs.json";
    const FALLBACK_LOGS = [
      {
        id: "963",
        title: "Signal Fragment",
        aliases: ["TRANSMISSION 963", "TRANSMISSION #963"],
        text: "The field is unstable. Chronohealers are requested to maintain position until the next pulse."
      },
      {
        id: "VOID",
        title: "Void Network",
        aliases: ["THE VOID", "VOID NETWORK"],
        text: "The Void is listening. It does not answer in words. It answers in delay."
      }
    ];

    const RATE_KEY = "ch_rate_v1";
    const MAX_ATTEMPTS = 6;
    const WINDOW_MS = 60 * 60 * 1000;

    const screen = document.getElementById("screen");
    const statusEl = document.getElementById("status");
    const form = document.getElementById("cmd");
    const input = document.getElementById("input");

    let logs = [];
    let audioUnlocked = false;

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function line(text = "", cls = "") {
      const el = document.createElement("div");
      el.className = cls ? `line ${cls}` : "line";
      el.textContent = text;
      screen.appendChild(el);
      screen.scrollTop = screen.scrollHeight;
      return el;
    }

    async function typeLine(text = "", cls = "", delay = 12) {
      const el = line("", cls);
      for (const char of text) {
        el.textContent += char;
        screen.scrollTop = screen.scrollHeight;
        await sleep(delay);
      }
    }

    function setStatus(value) {
      statusEl.textContent = value;
    }

    function flash(color = "gold") {
      const el = document.getElementById("flash");
      el.className = "flash-overlay " + (color === "red" ? "flash-red" : "flash-gold");
      void el.offsetWidth;
      el.classList.add("flash-active");
    }

    function playSFX(id, volume = 0.35) {
      const el = document.getElementById(id);
      if (!el) return;
      el.currentTime = 0;
      el.volume = volume;
      el.play().catch(() => {});
    }

    function unlockAudioOnce() {
      if (audioUnlocked) return;
      ["sfxRumble", "sfxWhisper"].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.volume = .001;
        el.play()
          .then(() => {
            el.pause();
            el.currentTime = 0;
            audioUnlocked = true;
          })
          .catch(() => {});
      });
    }

    document.addEventListener("click", unlockAudioOnce, { once: true });
    document.addEventListener("keydown", unlockAudioOnce, { once: true });

    function rlGet() {
      try { return JSON.parse(localStorage.getItem(RATE_KEY)) || {}; }
      catch { return {}; }
    }

    function rlSet(state) {
      localStorage.setItem(RATE_KEY, JSON.stringify(state));
    }

    const rateLimiter = {
      canAttempt() {
        const now = Date.now();
        const state = rlGet();
        if (!state.resetAt || now >= state.resetAt) {
          rlSet({ count: 0, resetAt: now + WINDOW_MS });
          return true;
        }
        return (state.count || 0) < MAX_ATTEMPTS;
      },
      registerFailure() {
        const now = Date.now();
        const state = rlGet();
        if (!state.resetAt || now >= state.resetAt) {
          rlSet({ count: 1, resetAt: now + WINDOW_MS });
        } else {
          state.count = (state.count || 0) + 1;
          rlSet(state);
        }
      },
      attemptsLeft() {
        const state = rlGet();
        if (!state.resetAt || Date.now() >= state.resetAt) return MAX_ATTEMPTS;
        return Math.max(0, MAX_ATTEMPTS - (state.count || 0));
      },
      msLeft() {
        const state = rlGet();
        return state.resetAt && Date.now() < state.resetAt ? state.resetAt - Date.now() : 0;
      },
      reset() {
        localStorage.removeItem(RATE_KEY);
      }
    };

    async function decryptBuffer(buffer, password) {
      const data = new Uint8Array(buffer);
      const salt = data.slice(0, 16);
      const iv = data.slice(16, 28);
      const tag = data.slice(data.length - 16);
      const cipher = data.slice(28, data.length - 16);
      const encodedPassword = new TextEncoder().encode(password);
      const baseKey = await crypto.subtle.importKey("raw", encodedPassword, "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const blob = new Uint8Array(cipher.length + tag.length);
      blob.set(cipher);
      blob.set(tag, cipher.length);
      return crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, blob.buffer);
    }

    async function loadLogs() {
      try {
        const response = await fetch(LOGS_JSON, { cache: "no-store" });
        if (!response.ok) throw new Error("missing logs");
        logs = await response.json();
      } catch {
        logs = FALLBACK_LOGS;
      }
    }

    async function boot() {
      setStatus("LINK_NEGOTIATING");
      line("[BOOT] INITIATING...");
      await sleep(500);
      line("[BOOT] CHRONOLOG TERMINAL ONLINE");
      await sleep(350);
      line("[LINK] VOID NETWORK: UNSTABLE", "dim");
      await sleep(350);
      line("[AUTH] MANUAL ACCESS REQUIRED", "gold");
      line("");
      line("Type HELP to list available commands.", "dim");
      setStatus("AWAITING_INPUT");
    }

    function help() {
      line("AVAILABLE COMMANDS:");
      line("  HELP            - show this help");
      line("  LIST            - list transmissions (masked)");
      line("  ACCESS <CODE>   - open a record, ex: ACCESS 963");
      line("  PASS <PASSWORD> - unlock encrypted attachment after ACCESS");
    }

    function listMasked() {
      if (!logs.length) {
        line("NO TRANSMISSIONS FOUND");
        return;
      }
      logs.forEach(log => {
        const title = (log.title || "UNTITLED").replace(/[A-Za-z0-9]/g, "#");
        line(`  - ${log.id} -- ${title}`);
      });
    }

    function findLog(code) {
      const normalized = code.trim().toUpperCase();
      return logs.find(log => String(log.id).toUpperCase() === normalized)
        || logs.find(log => {
          const aliases = Array.isArray(log.aliases) ? log.aliases : [];
          const bag = [log.id, log.title, log.file, ...aliases].join(" ").toUpperCase();
          return bag.includes(normalized);
        });
    }

    async function fetchLogText(log) {
      if (log.text) return log.text;
      if (!log.file) return "[NO RECORD BODY]";
      const response = await fetch(log.file, { cache: "no-store" });
      if (!response.ok) throw new Error("record fetch failed");
      return response.text();
    }

    async function openByCode(code) {
      const match = findLog(code);
      if (!match) {
        line("ACCESS: DENIED", "red");
        return false;
      }

      try {
        const text = await fetchLogText(match);
        line("--------------------------------");
        line(`[OPEN] LOG ${match.id}`, "gold");
        line(text);
        line("--------------------------------");
      } catch {
        line("ERROR: Failed to recover record.", "red");
        return false;
      }

      if (match.encFile) {
        line("ATTACHMENT: ENCRYPTED - type PASS <password> to unlock & download", "gold");
        form.dataset.pendingEnc = match.encFile;
        form.dataset.attachName = match.attachName || "attachment.bin";
        form.dataset.mime = match.mime || "application/octet-stream";
      } else {
        delete form.dataset.pendingEnc;
        delete form.dataset.attachName;
        delete form.dataset.mime;
      }
      return true;
    }

    async function tryPassword(password) {
      if (!form.dataset.pendingEnc) {
        line("NO ENCRYPTED ATTACHMENT PENDING");
        return;
      }

      try {
        const response = await fetch(form.dataset.pendingEnc, { cache: "no-store" });
        if (!response.ok) throw new Error("attachment fetch failed");
        const decrypted = await decryptBuffer(await response.arrayBuffer(), password);
        const blob = new Blob([decrypted], { type: form.dataset.mime || "application/octet-stream" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = form.dataset.attachName || "attachment.bin";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        line("ATTACHMENT: UNLOCKED", "gold");
      } catch {
        line("PASS: REJECTED", "red");
        flash("red");
        playSFX("sfxRumble");
      }
    }

    async function handleFailedAccess() {
      rateLimiter.registerFailure();
      const attempts = rateLimiter.attemptsLeft();
      if (attempts > 0) {
        line(`[TRACE] ${attempts} attempt${attempts === 1 ? "" : "s"} remaining.`, "dim");
        return;
      }

      flash("gold");
      playSFX("sfxRumble");
      playSFX("sfxWhisper");
      setStatus("TRACE_RISK: ELEVATED");
      await typeLine("[ACCESS LOCKED]", "gold");
      await typeLine("You're calling too much attention.");
      await typeLine("The Void is aware of your presence now.");
      line("");
      await typeLine("Wait before you try again.");
      await typeLine("Return only when you are certain of the code.");
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value) return;

      line("> " + value);
      input.value = "";

      const [cmdRaw, ...rest] = value.split(/\s+/);
      const cmd = cmdRaw.toUpperCase();
      const arg = rest.join(" ").trim();

      switch (cmd) {
        case "HELP":
          help();
          break;

        case "LIST":
          listMasked();
          break;

        case "ACCESS":
          if (!arg) {
            line("USAGE: ACCESS <CODE>");
            break;
          }

          if (!rateLimiter.canAttempt()) {
            const mins = Math.max(1, Math.ceil(rateLimiter.msLeft() / 60000));
            flash("red");
            playSFX("sfxRumble");
            setStatus("TRACE_RISK: HIGH");
            await typeLine("[TRACE WARNING]", "red");
            await typeLine("You've stayed in the Void Network for too long.");
            await typeLine("The signal is starting to echo back.");
            line("");
            await typeLine(`Disconnect now. Return in ~${mins} minutes.`);
            break;
          }

          if (!await openByCode(arg)) await handleFailedAccess();
          break;

        case "PASS":
          if (!arg) {
            line("USAGE: PASS <password>");
            break;
          }
          await tryPassword(arg);
          break;

        case "RESET":
          rateLimiter.reset();
          setStatus("AWAITING_INPUT");
          line("TRACE MEMORY CLEARED", "dim");
          break;

        default:
          if (!rateLimiter.canAttempt()) {
            line("ACCESS: LOCKED", "red");
            break;
          }
          if (!await openByCode(value)) await handleFailedAccess();
      }
    });

    (async function init() {
      await loadLogs();
      await boot();
      input.focus();
    })();
  </script>
</body>
</html>
